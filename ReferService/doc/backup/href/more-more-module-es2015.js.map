export default "<!--ion-tabs>\n  <div class=\"img_frame\"> \n    <h1>{{ first }}</h1>\n    <img id=\"imgFrame\" src=\"../assets/additional/feature.png\" [title]=\"first\">\n\n  </div>\n\n  <ion-tab-bar slot=\"bottom\">\n    <ion-tab-button tab=\"Guideline\" (click) = \"getLink(0)\">\n      <ion-label>Guideline</ion-label>\n      <ion-icon name=\"book-outline\"></ion-icon>\n    </ion-tab-button>\n    <ion-tab-button tab=\"Tools\" (click) = \"getLink(1)\">\n      <ion-label>Tools</ion-label>\n      <ion-icon name=\"briefcase-outline\"></ion-icon>\n    </ion-tab-button>\n    <ion-tab-button tab=\"Refer\" (click) = \"getLink(2)\">\n      <ion-label>Refer</ion-label>\n      <ion-icon name=\"clipboard-outline\"></ion-icon>\n    </ion-tab-button>\n  </ion-tab-bar>\n</ion-tabs-->\n\n<ion-content>\n  <div class=\"img_frame\">     \n    <img id=\"imgFrame\" [src]=\"selectedLink\" class=\"img_cover\">\n\n  </div>\n</ion-content>\n\n<ion-footer>\n  <ion-toolbar color=\"tertiary\">\n    <ion-buttons class=\"footer-center\">\n      <ion-button (click)=\"setInx(0)\">\n        <ion-icon name=\"book-outline\"></ion-icon>\n      </ion-button>\n      <ion-button (click)=\"setInx(1)\" style=\"margin-left: 40%;\">\n        <ion-icon name=\"briefcase-outline\"></ion-icon>\n      </ion-button>\n      <ion-button (click)=\"setInx(2)\" class=\"ion-float-right\">\n        <ion-icon name=\"clipboard-outline\"></ion-icon>\n      </ion-button>\n    </ion-buttons>\n   \n  </ion-toolbar>\n</ion-footer>";
