export default "<!--ion-header>\n  <ion-toolbar>\n    <ion-buttons slot=\"start\">\n      <ion-back-button defaultHref=\"/your-info\"></ion-back-button>\n    </ion-buttons>\n    <ion-title>page2</ion-title>\n  </ion-toolbar>\n</ion-header-->\n\n<ion-content>  \n  <ion-grid id=\"complate-grid\">\n      <ion-row>\n      <ion-col size=\"12\" style=\"padding: 0; height:35rem;\">\n        <div class=\"img_header\" style=\"margin:0; padding:0;\">     \n          <img id=\"imgFrame\" [src]=\"formHeaderUrl\" class=\"img_cover\">\n          <span class=\"titleTxt\">Referral Sent!</span>\n        </div>\n        <div class=\"msg-box\">\n          <ion-label position=\"stacked\" class=\"label\">The request has been sent successfully. You will receive an email shortly with confirmation details!</ion-label>\n          <!-- <div class=\"danger\" style=\"margin-top: 1em;\">\n            Data: {{ referalText }}\n          </div> -->\n        </div>        \n        \n        <!-- <ion-button strong routerLink=\"/more\" class=\"ion-float-right\"  style=\"margin-right: 5px;\">More...</ion-button> -->\n        <ion-button strong routerLink=\"/home\" [queryParams]=\"{withHeader:hasHeader}\" class=\"ion-float-right\"  style=\"margin-right: 5px;\">New Referral</ion-button>\n    </ion-col>\n    </ion-row>\n    </ion-grid> \n      \n  </ion-content>\n  ";
