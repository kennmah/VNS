<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Payment Complete</title>

<style>
    body {
        margin: 1rem 3rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        /*background-color: #f3f5f9;*/
        display: flex;
        justify-content: center;
        align-items: top;
        height: 90%;
    }

    .card {
        background: #ffffff;
        width: 100%;        
        padding: 60px 50px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        text-align: center;
    }

    .icon-circle {
        width: 90px;
        height: 90px;
        background-color: #e7f6ec;
        border-radius: 50%;
        margin: 0 auto 30px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .checkmark {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 4px solid #22a55d;
        position: relative;
    }

    .checkmark::after {
        content: "";
        position: absolute;
        left: 10px;
        top: 6px;
        width: 12px;
        height: 22px;
        border-right: 4px solid #22a55d;
        border-bottom: 4px solid #22a55d;
        transform: rotate(45deg);
    }

    h1 {
        margin: 0 0 15px;
        font-size: 26px;
        color: #0f2d4d;
    }

    .subtitle {
        color: #5f6f82;
        font-size: 16px;
        margin-bottom: 35px;
    }

    .subtitle a {
        color: #1d4ed8;
        text-decoration: none;
        font-weight: 500;
    }

    .info-box {
        background-color: #eef4fb;
        border: 1px solid #d6e4f5;
        border-radius: 8px;
        padding: 18px 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        text-align: left;
        margin-bottom: 40px;
    }

    .info-icon {
        font-size: 20px;
        color: #3b82f6;
    }

    .info-text {
        font-size: 14px;
        color: #34495e;
        line-height: 1.5;
    }

    .info-text a {
        color: #1d4ed8;
        text-decoration: none;
        font-weight: 500;
    }

    .btn {
        background-color: #0f2d4d;
        color: #ffffff;
        padding: 14px 30px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        transition: background 0.2s ease;
    }

    .btn:hover {
        background-color: #0b223b;
    }

    .btn span {
        font-size: 18px;
        line-height: 1;
    }
</style>
</head>

<body>

<div class="card">
    <div class="icon-circle">
        <div class="checkmark"></div>
    </div>

    <h1>Payment Process Complete</h1>
    <div class="subtitle">
        You may now close this page or return to the dashboard.
    </div>

    <div class="info-box">
        <div class="info-icon">📞</div>
        <div class="info-text">
            If you have any questions about your payment, please contact Member Services at 
            <a href="tel:18888676555">1-888-867-6555</a>
        </div>
    </div>

    <!--a class="btn" href="/s/member/make-payment" target="_blank">
        <span>✕</span> Close This Page
    </a-->
</div>

</body>

</html>
